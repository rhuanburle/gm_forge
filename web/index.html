<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Quest Script - Construtor de Aventuras RPG baseado na metodologia Adventure Sites">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Quest Script">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://quest-script.web.app/">
  <meta property="og:title" content="Quest Script">
  <meta property="og:description" content="Sua ferramenta para criação de aventuras RPG baseada na metodologia de Masmorra Viva.">
  <meta property="og:image" content="logo_share.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://quest-script.web.app/">
  <meta property="twitter:title" content="Quest Script">
  <meta property="twitter:description" content="Sua ferramenta para criação de aventuras RPG baseada na metodologia de Masmorra Viva.">
  <meta property="twitter:image" content="logo_share.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Quest Script</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #version-update-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: sans-serif;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
    }
    #version-update-screen.visible { display: flex; }
    #version-update-screen p { margin: 0; font-size: 15px; opacity: 0.8; }
    #version-update-screen .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Shown only during cache-clear on version update -->
  <div id="version-update-screen">
    <div class="spinner"></div>
    <p>Atualizando Quest Script...</p>
  </div>

  <script>
    // ─── Service Worker: reload page when new SW takes control ───────────────
    if ('serviceWorker' in navigator) {
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }

    // ─── Version-aware cache busting ─────────────────────────────────────────
    // Before loading Flutter, fetch version.json from the server (bypassing
    // both the browser HTTP cache and the SW cache via a unique query param).
    // If the stored version differs from the server version, wipe all caches,
    // unregister the SW and hard-reload so Flutter always loads fresh assets.
    (function () {
      var VERSION_KEY = 'qs_app_version';

      function loadFlutter() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.head.appendChild(s);
      }

      async function run() {
        var serverVersion = null;
        try {
          // ?t= makes the URL unknown to the SW RESOURCES map → network fetch
          var res = await fetch('version.json?t=' + Date.now(), { cache: 'no-store' });
          var data = await res.json();
          serverVersion = data.version + '+' + data.build_number;
        } catch (e) {
          // Network unavailable or version.json missing — load Flutter as-is
          console.warn('[qs] version check failed, loading normally:', e);
          loadFlutter();
          return;
        }

        var stored = localStorage.getItem(VERSION_KEY);

        if (stored !== null && stored !== serverVersion) {
          // New version detected — show update screen and clear everything
          document.getElementById('version-update-screen').classList.add('visible');

          try {
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function (r) { return r.unregister(); }));
            }
          } catch (e) {
            console.warn('[qs] cache clear error:', e);
          }

          localStorage.setItem(VERSION_KEY, serverVersion);
          window.location.reload(true);
          return;
        }

        // First load or same version
        localStorage.setItem(VERSION_KEY, serverVersion);
        loadFlutter();
      }

      run();
    })();
  </script>
</body>
</html>
